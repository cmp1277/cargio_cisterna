services:
  - type: web
    name: cisternas-api
    runtime: python
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_DURATION_MINUTES
        value: 30
      - key: CORS_ORIGINS
        value: "https://cisternas-api-wqac.onrender.com,null"
      - key: ADMIN_PASSWORD
        sync: false
      - key: USER_PASSWORD
        sync: false
      - key: CLIENT_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cisternas-db
          property: connectionString

databases:
  - name: cisternas-db
    plan: free
