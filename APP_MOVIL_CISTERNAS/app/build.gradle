}

android {
    namespace 'com.scpe.cisternas'
    compileSdk 36

    defaultConfig {
        applicationId 'com.scpe.cisternas'
        minSdk 23
        targetSdk 36
        versionCode 2
        versionName '1.1'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
