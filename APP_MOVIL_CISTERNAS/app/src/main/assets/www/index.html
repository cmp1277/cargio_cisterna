<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro de Cargas de Agua</title>

  <!-- Cambia esta URL por tu backend publicado con HTTPS. -->
  <meta name="api-url" content="https://cisternas-api-wqac.onrender.com/api/mobile">

    <style>
    :root {
      --navy: #06283d;
      --navy-2: #0b3f59;
      --navy-3: #105b72;
      --cyan: #21d6d3;
      --cyan-soft: #d8f6f5;
      --page: #eaf5fb;
      --surface: #ffffff;
      --line: #cfe0ed;
      --ink: #092238;
      --muted: #5f7892;
      --red: #b94a3d;
      --green: #1c9b6f;
      --shadow: 0 22px 52px rgba(6, 40, 61, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 95% 10%, rgba(33, 214, 211, 0.20), transparent 26rem),
        linear-gradient(135deg, #f7fbfe 0%, var(--page) 48%, #dbeef8 100%);
    }

    button, input, select, textarea { font: inherit; }
    .hidden { display: none !important; }

    .page {
      width: min(1120px, calc(100% - 24px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      place-items: center;
      padding: 22px 0;
    }

    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .login-card {
      max-width: 460px;
      padding: 0;
      border-left: 5px solid var(--cyan);
    }

    .login-card .brand {
      position: relative;
      margin: 0;
      padding: 30px 30px 26px;
      color: white;
      background:
        radial-gradient(circle at 88% 22%, rgba(33, 214, 211, 0.22), transparent 12rem),
        linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 58%, var(--navy-3) 100%);
      overflow: hidden;
    }

    .login-card .brand::before,
    .login-card .brand::after {
      content: "";
      position: absolute;
      inset: -45% 0 0;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(108deg, rgba(255,255,255,0.0) 0 18px, rgba(255,255,255,0.24) 19px 20px, rgba(255,255,255,0.0) 21px 42px);
      transform: translate3d(0, -30%, 0);
      animation: scpeRain 1.15s linear infinite;
      opacity: 0.48;
    }

    .login-card .brand::after {
      inset: -60% 0 0;
      background-image:
        repeating-linear-gradient(108deg, rgba(33,214,211,0.0) 0 24px, rgba(33,214,211,0.32) 25px 26px, rgba(33,214,211,0.0) 27px 58px);
      animation-duration: 1.8s;
      opacity: 0.34;
    }

    .login-card .brand > * {
      position: relative;
      z-index: 1;
    }

    @keyframes scpeRain {
      from { transform: translate3d(-18px, -34%, 0); }
      to { transform: translate3d(18px, 24%, 0); }
    }

    .login-card form { padding: 26px 30px 30px; }

    .app-card { padding: 20px; }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .brand img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      border-radius: 18px;
      background: white;
      padding: 5px;
      box-shadow: 0 12px 28px rgba(6, 40, 61, 0.12);
    }

    h1, h2, p { margin-top: 0; }

    h1 {
      margin-bottom: 5px;
      font-size: clamp(25px, 6vw, 38px);
      line-height: 1;
      letter-spacing: -0.045em;
    }

    .muted { color: var(--muted); }
    .login-card .muted, .topbar .muted { color: #c8dbea; }

    label {
      display: block;
      margin-bottom: 7px;
      color: #31526d;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    input, select, textarea {
      width: 100%;
      min-height: 44px;
      padding: 11px 12px;
      color: var(--ink);
      background: #f8fcff;
      border: 1px solid var(--line);
      border-radius: 14px;
      outline: none;
    }

    textarea { resize: vertical; }

    input:focus, select:focus, textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 4px rgba(33, 214, 211, 0.18);
    }

    .field { margin-bottom: 15px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 4; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 11px 18px;
      color: white;
      background: var(--navy);
      border: 0;
      border-left: 4px solid var(--cyan);
      border-radius: 16px;
      cursor: pointer;
      font-weight: 900;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 12px 26px rgba(6, 40, 61, 0.16);
    }

    .btn:hover {
      background: var(--navy-2);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: wait;
      transform: none;
    }

    .btn.full { width: 100%; }

    .btn.secondary {
      color: var(--navy);
      background: var(--cyan-soft);
      border: 1px solid rgba(33, 214, 211, 0.48);
      box-shadow: none;
    }

    .btn.secondary:hover {
      color: white;
      background: var(--navy-2);
    }

    .btn.danger {
      background: var(--red);
      border-left-color: #ffd2c8;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      padding: 24px;
      color: white;
      background:
        radial-gradient(circle at 93% 15%, rgba(33, 214, 211, 0.20), transparent 18rem),
        linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 62%, var(--navy-3) 100%);
      border: 0;
      border-radius: 20px;
      box-shadow: 0 18px 44px rgba(6, 40, 61, 0.18);
    }

    .topbar h1 { color: white; }

    .user-pill, .timer {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      color: white;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.26);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      backdrop-filter: blur(8px);
    }

    .message {
      min-height: 22px;
      margin-top: 13px;
      font-weight: 900;
    }

    .message.error { color: var(--red); }
    .message.success { color: var(--green); }

    #calculated-volume.error {
      color: var(--red);
      font-weight: 900;
    }

    #calculated-volume {
      background: var(--cyan-soft);
      color: var(--navy);
      font-weight: 900;
    }

    @media (max-width: 760px) {
      .page { place-items: start center; }
      .grid { grid-template-columns: 1fr; }
      .span-2, .span-3, .span-4 { grid-column: span 1; }
      .topbar, .row {
        align-items: stretch;
        flex-direction: column;
      }
      .topbar .row { flex-direction: row; flex-wrap: wrap; }
    }

    @media (prefers-reduced-motion: reduce) {
      .login-card .brand::before,
      .login-card .brand::after {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section id="login-section" class="card login-card">
      <div class="brand">
        <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
        <div>
          <h1>Iniciar sesion</h1>
          <p class="muted">Registro de carguio de agua a Cisternas - SCPE</p>
        </div>
      </div>

      <form id="login-form" autocomplete="on">
        <div class="field">
          <label for="username">Usuario</label>
          <input id="username" name="username" autocomplete="username" required placeholder="Ingrese su usuario">
        </div>

        <div class="field">
          <label for="password">Contrasena</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Ingrese su contrasena">
        </div>

        <div class="row field">
          <label style="display:flex;align-items:center;gap:8px;margin:0;text-transform:none;letter-spacing:0;">
            <input id="remember-me" type="checkbox" style="width:16px;min-height:16px;">
            Recordar usuario
          </label>
          <button id="test-connection" class="btn secondary" type="button">Probar API</button>
        </div>

        <button id="login-button" class="btn full" type="submit">Ingresar</button>
        <div id="login-message" class="message" role="status"></div>
      </form>
    </section>

    <section id="app-section" class="card app-card hidden">
      <div class="topbar">
        <div class="brand" style="margin:0;">
          <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
          <div>
            <h1>Registro de carga</h1>
            <p class="muted">Los datos se guardan en la base central online.</p>
          </div>
        </div>
        <div class="row">
          <span id="current-user" class="user-pill"></span>
          <span id="timer" class="timer">Sesion: 30:00</span>
          <button id="logout-button" class="btn danger" type="button">Salir</button>
        </div>
      </div>

      <form id="water-load-form" class="grid">
        <div class="field span-2">
          <label for="driver-name">Conductor</label>
          <input id="driver-name" required>
        </div>

        <div class="field span-2">
          <label for="plate-number">Placa</label>
          <input id="plate-number" required>
        </div>

        <div class="field">
          <label for="initial-reading">Lectura inicial (m3)</label>
          <input id="initial-reading" type="number" min="0" step="0.01" required>
        </div>

        <div class="field">
          <label for="final-reading">Lectura final (m3)</label>
          <input id="final-reading" type="number" min="0" step="0.01" required>
        </div>

        <div class="field">
          <label for="calculated-volume">Volumen calculado</label>
          <input id="calculated-volume" readonly>
        </div>

        <div class="field">
          <label for="company-type">Tipo de empresa</label>
          <select id="company-type" required>
            <option value="" disabled selected>Seleccione</option>
            <option>Gobierno Nacional</option>
            <option>Gobierno Departamental</option>
            <option>Gobierno Municipal</option>
            <option>Bomberos</option>
            <option>Ayuda Comunitaria</option>
            <option>Particular</option>
          </select>
        </div>

        <div class="field span-2">
          <label for="company-name">Empresa / Entidad</label>
          <input id="company-name" required placeholder="Ej: Constructora Andina">
        </div>

        <div class="field span-2">
          <label for="employee-code">Codigo de funcionario</label>
          <input id="employee-code" required placeholder="Ej: 1277">
        </div>

        <div class="field span-3">
          <label for="characteristics">Caracteristicas / Observaciones</label>
          <textarea id="characteristics" rows="2"></textarea>
        </div>

        <div class="field">
          <label for="ebap">EBAP</label>
          <select id="ebap" required>
            <option value="" disabled selected>Seleccione</option>
            <option>Norte</option>
            <option>Sur</option>
            <option>Este</option>
            <option>Sudoeste</option>
          </select>
        </div>

        <div class="span-4 row">
          <div id="save-message" class="message" role="status"></div>
          <button id="submit-button" class="btn" type="submit">Guardar registro</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    const API_URL = document.querySelector('meta[name="api-url"]')?.content?.trim() || '';
    const SESSION_TIMEOUT = 30;
    const TOKEN_KEY = 'cisternas_mobile_token';
    const USER_KEY = 'cisternas_mobile_user';

    const loginSection = document.getElementById('login-section');
    const appSection = document.getElementById('app-section');
    const loginForm = document.getElementById('login-form');
    const waterForm = document.getElementById('water-load-form');
    const loginButton = document.getElementById('login-button');
    const submitButton = document.getElementById('submit-button');
    const loginMessage = document.getElementById('login-message');
    const saveMessage = document.getElementById('save-message');
    const currentUser = document.getElementById('current-user');
    const timerText = document.getElementById('timer');

    function setMessage(element, text, type = '') {
      element.textContent = text || '';
      element.classList.toggle('error', type === 'error');
      element.classList.toggle('success', type === 'success');
    }

    function ensureConfig() {
      if (!API_URL || API_URL.includes('TU-DOMINIO') || API_URL.includes('TU_URL')) {
        setMessage(loginMessage, 'Falta configurar la URL HTTPS del backend en meta api-url.', 'error');
        return false;
      }
      return true;
    }

    async function postJSON(payload, timeout = 15000) {
      if (!ensureConfig()) throw new Error('API no configurada');
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          signal: controller.signal,
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok && !data.message) throw new Error(`HTTP ${response.status}`);
        return data;
      } finally {
        clearTimeout(timer);
      }
    }

    function getStoredUser() {
      try {
        return JSON.parse(sessionStorage.getItem(USER_KEY) || 'null');
      } catch (_) {
        return null;
      }
    }

    function showLogin() {
      appSection.classList.add('hidden');
      loginSection.classList.remove('hidden');
      if (window.__sessionTimer) clearTimeout(window.__sessionTimer);
    }

    function showApp(user) {
      loginSection.classList.add('hidden');
      appSection.classList.remove('hidden');
      currentUser.textContent = `${user.username} (${user.role})`;
      startSessionTimer();
    }

    function logout() {
      sessionStorage.removeItem(TOKEN_KEY);
      sessionStorage.removeItem(USER_KEY);
      showLogin();
    }

    function checkAuthentication() {
      const user = getStoredUser();
      const token = sessionStorage.getItem(TOKEN_KEY);
      if (!user || !token) return false;
      const elapsed = (Date.now() - user.loginTime) / 60000;
      return elapsed <= user.timeout;
    }

    async function validateSession() {
      const token = sessionStorage.getItem(TOKEN_KEY);
      if (!token) return false;
      try {
        const data = await postJSON({ action: 'validateToken', token });
        return !!data.success;
      } catch (_) {
        return false;
      }
    }

    function startSessionTimer() {
      const user = getStoredUser();
      if (!user) return;
      const tick = () => {
        const remaining = (user.timeout * 60000) - (Date.now() - user.loginTime);
        if (remaining <= 0) {
          setMessage(loginMessage, 'Sesion expirada. Inicie sesion nuevamente.', 'error');
          logout();
          return;
        }
        const minutes = Math.floor(remaining / 60000);
        const seconds = String(Math.floor((remaining % 60000) / 1000)).padStart(2, '0');
        timerText.textContent = `Sesion: ${minutes}:${seconds}`;
        window.__sessionTimer = setTimeout(tick, 1000);
      };
      tick();
    }

    function updateCalculatedVolume() {
      const initial = parseFloat(document.getElementById('initial-reading').value || '0');
      const final = parseFloat(document.getElementById('final-reading').value || '0');
      const output = document.getElementById('calculated-volume');
      output.classList.remove('error');
      if (final && final < initial) {
        output.value = 'Error';
        output.classList.add('error');
        return 0;
      }
      const volume = final - initial;
      output.value = volume > 0 ? `${volume.toFixed(2)} m3` : '';
      return volume;
    }

    async function login(username, password) {
      loginButton.disabled = true;
      setMessage(loginMessage, 'Verificando credenciales...');
      try {
        const data = await postJSON({ action: 'login', username, password });
        if (!data.success) throw new Error(data.message || 'Credenciales incorrectas.');
        const user = {
          token: data.token,
          username: data.user.username,
          role: data.user.role,
          loginTime: Date.now(),
          timeout: SESSION_TIMEOUT,
        };
        sessionStorage.setItem(TOKEN_KEY, data.token);
        sessionStorage.setItem(USER_KEY, JSON.stringify(user));
        setMessage(loginMessage, '');
        showApp(user);
      } catch (error) {
        setMessage(loginMessage, error.message || 'No se pudo conectar con el servidor.', 'error');
      } finally {
        loginButton.disabled = false;
      }
    }

    document.getElementById('test-connection').addEventListener('click', async () => {
      setMessage(loginMessage, 'Probando conexion...');
      try {
        const data = await postJSON({ action: 'test' });
        if (!data.success) throw new Error(data.message || 'La API respondio con error.');
        setMessage(loginMessage, data.message || 'API operativa.', 'success');
      } catch (error) {
        setMessage(loginMessage, error.message || 'No se pudo conectar con la API.', 'error');
      }
    });

    loginForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) {
        setMessage(loginMessage, 'Complete usuario y contrasena.', 'error');
        return;
      }
      if (document.getElementById('remember-me').checked) {
        localStorage.setItem('cisternas_remembered_user', username);
      } else {
        localStorage.removeItem('cisternas_remembered_user');
      }
      login(username, password);
    });

    document.getElementById('logout-button').addEventListener('click', logout);
    document.getElementById('initial-reading').addEventListener('input', updateCalculatedVolume);
    document.getElementById('final-reading').addEventListener('input', updateCalculatedVolume);

    waterForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      setMessage(saveMessage, '');

      if (!checkAuthentication()) {
        setMessage(loginMessage, 'Sesion expirada. Inicie sesion nuevamente.', 'error');
        logout();
        return;
      }

      const initial = parseFloat(document.getElementById('initial-reading').value || '0');
      const final = parseFloat(document.getElementById('final-reading').value || '0');
      const volume = updateCalculatedVolume();

      if (final <= initial || volume <= 0) {
        setMessage(saveMessage, 'La lectura final debe ser mayor que la inicial.', 'error');
        return;
      }

      const user = getStoredUser();
      const payload = {
        action: 'saveData',
        token: user.token,
        driverName: document.getElementById('driver-name').value.trim(),
        plateNumber: document.getElementById('plate-number').value.trim(),
        employeeCode: document.getElementById('employee-code').value.trim(),
        ebap: document.getElementById('ebap').value,
        initialReading: initial,
        finalReading: final,
        loadVolume: volume,
        companyType: document.getElementById('company-type').value,
        companyName: document.getElementById('company-name').value.trim(),
        characteristics: document.getElementById('characteristics').value.trim(),
      };

      submitButton.disabled = true;
      setMessage(saveMessage, 'Guardando en la base central...');
      try {
        const result = await postJSON(payload);
        if (!result.success) throw new Error(result.message || 'No se pudo guardar.');
        waterForm.reset();
        document.getElementById('calculated-volume').value = '';
        setMessage(saveMessage, `Registro guardado correctamente. ID: ${result.id}`, 'success');
      } catch (error) {
        setMessage(saveMessage, error.message || 'No se pudo conectar con el servidor.', 'error');
      } finally {
        submitButton.disabled = false;
      }
    });

    document.addEventListener('DOMContentLoaded', async () => {
      const remembered = localStorage.getItem('cisternas_remembered_user');
      if (remembered) {
        document.getElementById('username').value = remembered;
        document.getElementById('remember-me').checked = true;
      }

      if (checkAuthentication() && await validateSession()) {
        showApp(getStoredUser());
      } else {
        logout();
      }
    });
  </script>
</body>
</html>
