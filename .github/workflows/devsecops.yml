name: DevSecOps CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  backend-security-and-tests:
    name: Backend tests and security scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
      SECRET_KEY: ci-secret-key-only-for-tests
      ADMIN_PASSWORD: admin123
      USER_PASSWORD: usuario123
      CLIENT_PASSWORD: cliente123
      SESSION_DURATION_MINUTES: "30"
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: "8"
      LOGIN_RATE_LIMIT_WINDOW_MINUTES: "15"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Run automated tests
        run: |
          python --version
          python -c "import os, sys; print('cwd=', os.getcwd()); print('pythonpath=', os.environ.get('PYTHONPATH')); print('sys.path[0]=', sys.path[0])"
          python -m pytest tests -q

      - name: Static security scan
        run: bandit app.py -ll

      - name: Dependency vulnerability audit
        run: pip-audit -r requirements.txt

  android-build:
    name: Android debug build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK
        working-directory: APP_MOVIL_CISTERNAS
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
